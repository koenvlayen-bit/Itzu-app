<!DOCTYPE html>
<html lang="nl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itzu · Project Overzicht</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="dark"]{
  --bleu:#6366F1;--bleu-l:rgba(99,102,241,.15);--bleu-m:#818CF8;
  --bg:#0D0D14;--surf:#16161F;--surf2:#1E1E2A;--bdr:rgba(255,255,255,.08);
  --txt:#F0F0FF;--mut:rgba(255,255,255,.4);
  --grn:#22C55E;--grn-b:rgba(34,197,94,.15);--grn-row:rgba(34,197,94,.06);
  --amb:#F59E0B;--amb-b:rgba(245,158,11,.15);
  --red:#F87171;--red-b:rgba(248,113,113,.15);--red-row:rgba(248,113,113,.06);
  --nav-bg:rgba(13,13,20,.9);
  --badge-grn-bg:rgba(34,197,94,.15);--badge-grn-txt:#4ADE80;
  --badge-blu-bg:rgba(99,102,241,.2);--badge-blu-txt:#A5B4FC;
  --badge-amb-bg:rgba(245,158,11,.15);--badge-amb-txt:#FCD34D;
  --badge-gry-bg:rgba(255,255,255,.07);--badge-gry-txt:rgba(255,255,255,.45);
  --badge-red-bg:rgba(248,113,113,.15);--badge-red-txt:#FCA5A5;
  --geo-stroke:#6366F1;--r:8px;--nav-h:52px;
}
[data-theme="light"]{
  --bleu:#4F46E5;--bleu-l:#EEF2FF;--bleu-m:#818CF8;
  --bg:#F2F1EE;--surf:#fff;--surf2:#F8F8F6;--bdr:rgba(0,0,0,.09);
  --txt:#0D0D0D;--mut:#6B6B6B;
  --grn:#16A34A;--grn-b:#DCFCE7;--grn-row:#F0FDF4;
  --amb:#D97706;--amb-b:#FEF3C7;
  --red:#DC2626;--red-b:#FEE2E2;--red-row:#FEF2F2;
  --nav-bg:rgba(255,255,255,.95);
  --badge-grn-bg:#DCFCE7;--badge-grn-txt:#15803D;
  --badge-blu-bg:#DBEAFE;--badge-blu-txt:#1D4ED8;
  --badge-amb-bg:#FEF3C7;--badge-amb-txt:#D97706;
  --badge-gry-bg:#F1F5F9;--badge-gry-txt:#475569;
  --badge-red-bg:#FEE2E2;--badge-red-txt:#DC2626;
  --geo-stroke:#4F46E5;--r:8px;--nav-h:52px;
}
html,body{font-family:'Bricolage Grotesque',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;transition:background .3s,color .3s}
.nav{height:var(--nav-h);background:var(--nav-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 28px;gap:10px;position:sticky;top:0;z-index:100;transition:background .3s,border-color .3s}
.nav-back{display:none;align-items:center;gap:5px;background:none;border:none;cursor:pointer;font:500 13px 'Bricolage Grotesque',sans-serif;color:var(--mut);padding:5px 8px 5px 4px;border-radius:6px;transition:background .15s,color .15s}
.nav-back:hover{background:var(--surf2);color:var(--txt)}
.nav-back.visible{display:flex}
.nav-logos{display:flex;align-items:center}
.nav-logo-aziri{font-size:16px;font-weight:800;letter-spacing:-.4px;color:var(--bleu-m)}
.nav-divider{width:1px;height:18px;background:var(--bdr);margin:0 10px}
.nav-logo-itzu{font-size:15px;font-weight:700;color:var(--txt);letter-spacing:-.3px}
.nav-spacer{flex:1}
.nav-live{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--grn)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite;display:inline-block}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}70%{box-shadow:0 0 0 6px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
.theme-toggle{background:none;border:1px solid var(--bdr);border-radius:20px;cursor:pointer;padding:5px 11px;display:flex;align-items:center;gap:6px;color:var(--mut);font:600 11px 'Bricolage Grotesque',sans-serif;transition:all .15s;margin-left:8px;white-space:nowrap}
.theme-toggle:hover{background:var(--surf2);color:var(--txt)}
.btn-icon{background:none;border:1px solid var(--bdr);border-radius:8px;cursor:pointer;padding:6px 7px;display:flex;align-items:center;justify-content:center;color:var(--mut);transition:all .15s;margin-left:6px}
.btn-icon:hover{background:var(--surf2);color:var(--txt)}
.btn-p{border:none;cursor:pointer;font:600 13px 'Bricolage Grotesque',sans-serif;padding:10px 24px;border-radius:20px;background:var(--bleu);color:#fff;transition:opacity .15s,transform .1s}
.btn-p:hover{opacity:.85;transform:translateY(-1px)}
.view{display:none;animation:fadeIn .2s ease}.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.landing-wrap{position:relative;min-height:calc(100vh - var(--nav-h));overflow:hidden;background:var(--bg);transition:background .3s}
.landing-inner{position:relative;z-index:2;max-width:700px;margin:0 auto;padding:80px 32px 100px}
.landing-crumb{font-size:11px;font-weight:600;letter-spacing:1.3px;color:var(--mut);text-transform:uppercase;margin-bottom:20px}
.landing-title{font-size:clamp(52px,8vw,88px);font-weight:800;line-height:.92;letter-spacing:-3px;color:var(--txt);margin-bottom:40px;transition:color .3s}
.landing-title span{color:var(--bleu-m)}
.landing-week{position:fixed;bottom:28px;right:32px;font-size:11px;font-weight:600;color:var(--mut)}
.po-header{max-width:1100px;margin:0 auto;padding:32px 28px 18px;display:flex;align-items:flex-end;justify-content:space-between}
.po-title{font-size:24px;font-weight:800;letter-spacing:-.5px;color:var(--txt)}
.po-meta{font-size:12px;color:var(--mut);text-align:right}
.po-grid{max-width:1100px;margin:0 auto;padding:0 28px 60px;display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
.proj-card{background:var(--surf);border:1.5px solid var(--bdr);border-radius:14px;padding:22px;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s,background .3s;display:flex;flex-direction:column;gap:14px}
[data-theme="dark"] .proj-card:hover{transform:translateY(-3px);box-shadow:0 10px 40px rgba(99,102,241,.2);border-color:rgba(129,140,248,.3)}
[data-theme="light"] .proj-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(79,70,229,.13);border-color:var(--bleu-m)}
.card-name{font-size:24px;font-weight:800;letter-spacing:-.4px;line-height:1.1;color:var(--txt)}
.card-sub{font-size:13px;color:var(--mut);font-weight:500;margin-top:3px}
.badge-strip{display:flex;flex-wrap:wrap;gap:5px}
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.badge-grn{background:var(--badge-grn-bg);color:var(--badge-grn-txt)}
.badge-blu{background:var(--badge-blu-bg);color:var(--badge-blu-txt)}
.badge-amb{background:var(--badge-amb-bg);color:var(--badge-amb-txt)}
.badge-gry{background:var(--badge-gry-bg);color:var(--badge-gry-txt)}
.badge-red{background:var(--badge-red-bg);color:var(--badge-red-txt)}
.card-stats{display:flex;gap:14px}
.card-stat{flex:1}
.card-stat-val{font-size:22px;font-weight:800;color:var(--txt)}
.c-grn{color:var(--grn)}.c-red{color:var(--red)}
.card-stat-lbl{font-size:11px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.3px}
.card-rows{display:flex;flex-direction:column}
.card-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--bdr);font-size:13px}
.card-row:first-child{border-top:none;padding-top:0}
.card-row-desc{flex:1;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
.card-row-date{font-size:10px;color:var(--mut);font-weight:600;white-space:nowrap}
.card-footer{display:flex;justify-content:flex-end;padding-top:12px;border-top:1px solid var(--bdr)}
.card-cta{font-size:11px;font-weight:700;color:var(--bleu-m)}
.detail-wrap{max-width:1060px;margin:0 auto;padding:32px 28px 80px}
.detail-crumb{font-size:10px;font-weight:700;letter-spacing:1.4px;color:var(--mut);text-transform:uppercase;margin-bottom:10px}
.detail-title{font-size:30px;font-weight:800;letter-spacing:-.6px;margin-bottom:24px;color:var(--txt)}
.hero-stats{display:flex;gap:12px;margin-bottom:28px}
.hero-stat{flex:1;background:var(--surf);border:1.5px solid var(--bdr);border-radius:var(--r);padding:16px 18px;transition:background .3s,border-color .3s}
.hero-stat-val{font-size:32px;font-weight:800;line-height:1;margin-bottom:4px;color:var(--txt)}
.hero-stat-lbl{font-size:10px;font-weight:600;color:var(--mut);text-transform:uppercase}
.table-section{background:var(--surf);border:1.5px solid var(--bdr);border-radius:12px;overflow:hidden;transition:background .3s,border-color .3s}
.table-section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bdr)}
.table-section-title{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
.btn-add{font:600 12px 'Bricolage Grotesque',sans-serif;background:var(--bleu-l);color:var(--bleu-m);border:none;padding:6px 14px;border-radius:20px;cursor:pointer}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--mut);padding:10px 14px;text-align:left;border-bottom:1px solid var(--bdr);background:var(--surf2);transition:background .3s}
td{padding:9px 14px;font-size:13px;border-bottom:1px solid var(--bdr);vertical-align:middle;color:var(--txt)}
tr:last-child td{border-bottom:none}
tr.row-grn{background:var(--grn-row)}
tr.row-red{background:var(--red-row)}
[contenteditable]{outline:none;border-radius:4px;padding:1px 4px;transition:background .15s;min-width:40px;display:inline-block;color:var(--txt)}
[contenteditable]:focus{background:var(--bleu-l)}
.status-sel{font:600 10px 'Bricolage Grotesque',sans-serif;border:none;background:none;cursor:pointer;padding:3px 8px;border-radius:20px;outline:none;-webkit-appearance:none;appearance:none}
.actie-toggle{font:700 10px 'Bricolage Grotesque',sans-serif;border:1.5px solid var(--bdr);background:transparent;color:var(--mut);padding:3px 9px;border-radius:20px;cursor:pointer;transition:all .15s}
.actie-toggle.ja{background:var(--badge-red-bg);color:var(--badge-red-txt);border-color:var(--red)}
.btn-del{background:none;border:none;cursor:pointer;color:var(--mut);font-size:14px;padding:2px 6px;border-radius:4px}
.btn-del:hover{color:var(--red)}
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surf2);border:1px solid var(--bdr);border-radius:14px;padding:26px;width:420px;max-width:calc(100vw - 32px);box-shadow:0 24px 60px rgba(0,0,0,.3);animation:modalIn .2s ease;transition:background .3s}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.modal-title{font-size:18px;font-weight:800;margin-bottom:18px;color:var(--txt)}
.modal-field{margin-bottom:14px}
.modal-label{font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;display:block}
.modal-input,.modal-select,.modal-textarea{width:100%;font:400 13px 'Bricolage Grotesque',sans-serif;border:1.5px solid var(--bdr);border-radius:var(--r);padding:8px 11px;background:var(--bg);color:var(--txt);outline:none;transition:border-color .15s,background .3s}
.modal-input:focus,.modal-select:focus,.modal-textarea:focus{border-color:var(--bleu-m)}
.modal-input[disabled]{opacity:.35}
.modal-textarea{resize:vertical;min-height:64px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn-cancel{font:600 12px 'Bricolage Grotesque',sans-serif;background:transparent;border:1.5px solid var(--bdr);color:var(--mut);padding:7px 16px;border-radius:20px;cursor:pointer;transition:all .15s}
.btn-cancel:hover{background:var(--surf);color:var(--txt)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surf2);border:1px solid var(--bdr);color:var(--txt);font-size:12px;font-weight:600;padding:9px 18px;border-radius:20px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:700px){.po-grid{grid-template-columns:1fr}.hero-stats{flex-direction:column}.landing-title{font-size:44px}}
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-back" id="navBack" onclick="goBack()">

let data=[],viewStack=['vLanding'],currentProjId=null,addModalProjId=null,nextId=100;

function openLogin(){
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  document.getElementById('loginError').style.display='none';
  document.getElementById('loginModal').classList.add('open');
  setTimeout(()=>document.getElementById('loginUser').focus(),100);
}
async function doLogin(){
  const username=document.getElementById('loginUser').value.trim();
  const pass=document.getElementById('loginPass').value;
  const email=USERNAME_MAP[username];
  const errEl=document.getElementById('loginError');
  if(!email){errEl.style.display='block';document.getElementById('loginPass').value='';document.getElementById('loginPass').focus();return;}
  const db=getDb();
  if(!db){errEl.style.display='block';return;}
  const{error}=await db.auth.signInWithPassword({email,password:pass});
  if(error){errEl.style.display='block';document.getElementById('loginPass').value='';document.getElementById('loginPass').focus();}
  else{closeModal('loginModal');await loadData();showView('vPo');}
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('loginModal').classList.contains('open'))doLogin();
});

function getTheme(){return localStorage.getItem(THEME_KEY)||'dark'}
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  const icon=document.getElementById('themeIcon'),label=document.getElementById('themeLabel');
  if(t==='dark'){label.textContent='Light';icon.innerHTML='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';}
  else{label.textContent='Dark';icon.innerHTML='<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';}
  if(currentProjId&&document.getElementById('vPoDetail').classList.contains('active'))
    document.querySelectorAll('.status-sel').forEach(sel=>{sel.style.cssText=statusSelectStyle(sel.value)});
}
function toggleTheme(){const next=getTheme()==='dark'?'light':'dark';localStorage.setItem(THEME_KEY,next);applyTheme(next);}

function getDb(){const{createClient}=window.supabase||{};if(!createClient)return null;return createClient(SUPABASE_URL,SUPABASE_ANON_KEY)}

async function loadData(){
  const db=getDb();if(!db)return false;
  const{data:projects,error:pErr}=await db.from('projects').select('*').order('sort_order');
  if(pErr)return false;
  const{data:trajecten,error:tErr}=await db.from('trajecten').select('*').order('sort_order');
  if(tErr)return false;
  data=projects.map(p=>({id:p.slug,dbId:p.id,name:p.name,rows:trajecten.filter(t=>t.project_id===p.id).map(t=>({id:t.id,desc:t.beschrijving,status:t.status,date:t.oplevering,comment:t.commentaar,actie:t.actie_itzu}))}));
  return true;
}

async function init(){
  applyTheme(getTheme());
  try{
    const db=getDb();if(!db)throw new Error('no supabase');
    const{data:{session}}=await db.auth.getSession();
    if(!session){setWeekInfo();return;}
    const ok=await loadData();
    if(ok)showView('vPo');
  }catch(e){
    data=JSON.parse(JSON.stringify(FALLBACK));
  }
  setWeekInfo();
}

async function logout(){
  const db=getDb();if(db)await db.auth.signOut();
  data=[];viewStack=['vLanding'];
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('vLanding').classList.add('active');
  document.getElementById('navBack').classList.remove('visible');
  showToast('Uitgelogd');
}

async function updateTraject(rowId,fields){try{const db=getDb();if(!db)return;const m={};if('desc'in fields)m.beschrijving=fields.desc;if('status'in fields)m.status=fields.status;if('date'in fields)m.oplevering=fields.date;if('comment'in fields)m.commentaar=fields.comment;if('actie'in fields)m.actie_itzu=fields.actie;await db.from('trajecten').update(m).eq('id',rowId);}catch(e){}}
async function insertTraject(projectDbId,fields,sortOrder){try{const db=getDb();if(!db)return null;const{data:row}=await db.from('trajecten').insert({project_id:projectDbId,beschrijving:fields.desc||'',status:fields.status||'Aankomend',oplevering:fields.date||'',commentaar:fields.comment||'',actie_itzu:fields.actie||false,sort_order:sortOrder}).select().single();return row;}catch(e){return null}}
async function deleteTraject(rowId){try{const db=getDb();if(!db)return;await db.from('trajecten').delete().eq('id',rowId);}catch(e){}}

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function statusClass(s){if(s==='Afgerond')return'badge-grn';if(s==='On track')return'badge-blu';if(s==='Aankomend')return'badge-amb';if(s==='Ingepland')return'badge-gry';if(s==='Geblokkeerd')return'badge-red';return'badge-gry'}
function rowClass(s){if(s==='Afgerond')return'row-grn';if(s==='Geblokkeerd')return'row-red';return''}
function statusSelectStyle(s){
  const d=getTheme()==='dark';
  if(s==='Afgerond')return d?'background:rgba(34,197,94,.15);color:#4ADE80':'background:#DCFCE7;color:#15803D';
  if(s==='On track')return d?'background:rgba(99,102,241,.2);color:#A5B4FC':'background:#DBEAFE;color:#1D4ED8';
  if(s==='Aankomend')return d?'background:rgba(245,158,11,.15);color:#FCD34D':'background:#FEF3C7;color:#D97706';
  if(s==='Ingepland')return d?'background:rgba(255,255,255,.08);color:rgba(255,255,255,.45)':'background:#F1F5F9;color:#475569';
  if(s==='Geblokkeerd')return d?'background:rgba(248,113,113,.15);color:#FCA5A5':'background:#FEE2E2;color:#DC2626';
  return'';
}
function countByStatus(rows,s){return rows.filter(r=>r.status===s).length}
function setWeekInfo(){
  const now=new Date(),start=new Date(now.getFullYear(),0,1);
  const week=Math.ceil(((now-start)/86400000+start.getDay()+1)/7);
  const months=['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
  const lw=document.getElementById('landingWeek');if(lw)lw.textContent=`Week ${week} · ${months[now.getMonth()]} ${now.getFullYear()}`;
  const pm=document.getElementById('poMeta');if(pm)pm.innerHTML=`<div>Week ${week}</div><div>${months[now.getMonth()]} ${now.getFullYear()}</div>`;
}
function showView(viewId,projId){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
  viewStack.push(viewId);
  document.getElementById('navBack').classList.toggle('visible',viewStack.length>1);
  if(viewId==='vPo')renderDashboard();
  if(viewId==='vPoDetail'){currentProjId=projId;renderDetail(projId);}
  setWeekInfo();
}
function goBack(){
  if(viewStack.length<=1)return;
  viewStack.pop();
  const prev=viewStack[viewStack.length-1];
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(prev).classList.add('active');
  document.getElementById('navBack').classList.toggle('visible',viewStack.length>1);
  if(prev==='vPo')renderDashboard();
}
function renderDashboard(){
  const grid=document.getElementById('poGrid');grid.innerHTML='';
  data.forEach(proj=>{
    const rows=proj.rows,afg=countByStatus(rows,'Afgerond'),actie=rows.filter(r=>r.actie).length,gebl=countByStatus(rows,'Geblokkeerd'),total=rows.length;
    const badgeHtml=['Afgerond','On track','Aankomend','Ingepland','Geblokkeerd'].map(s=>{const c=countByStatus(rows,s);return c?`<span class="badge ${statusClass(s)}">${s} ×${c}</span>`:''}).join('');
    const allRowsHtml=rows.map(r=>`<div class="card-row"><span class="card-row-desc">${r.desc}</span><span class="badge ${statusClass(r.status)}" style="font-size:9px;flex-shrink:0">${r.status}</span>${r.date?`<span class="card-row-date">${r.date}</span>`:''}</div>`).join('');
    const card=document.createElement('div');card.className='proj-card';
    card.innerHTML=`<div><div class="card-name">${proj.name}</div><div class="card-sub">${total} traject${total!==1?'en':''}</div></div><div class="badge-strip">${badgeHtml}</div><div class="card-stats"><div class="card-stat"><div class="card-stat-val c-grn">${afg}</div><div class="card-stat-lbl">Afgerond</div></div><div class="card-stat"><div class="card-stat-val ${actie>0?'c-red':''}">${actie}</div><div class="card-stat-lbl">Actie Itzu</div></div><div class="card-stat"><div class="card-stat-val ${gebl>0?'c-red':''}">${gebl}</div><div class="card-stat-lbl">Geblokkeerd</div></div></div><div class="card-rows">${allRowsHtml}</div><div class="card-footer"><span class="card-cta">Details &amp; bewerken →</span></div>`;
    card.addEventListener('click',()=>showView('vPoDetail',proj.id));
    grid.appendChild(card);
  });
}
function renderDetail(projId){
  const proj=data.find(p=>p.id===projId);if(!proj)return;
  const rows=proj.rows,total=rows.length,actie=rows.filter(r=>r.actie).length,gebl=countByStatus(rows,'Geblokkeerd');
  const tableRows=rows.map((r,i)=>`<tr class="${rowClass(r.status)}" id="tr-${r.id}"><td style="color:var(--mut);font-weight:700;width:28px">${i+1}</td><td><span contenteditable="true" data-id="${r.id}" data-field="desc" onblur="saveField(this)">${r.desc}</span></td><td><select class="status-sel" style="${statusSelectStyle(r.status)}" data-id="${r.id}" onchange="saveStatus(this)">${['Afgerond','On track','Aankomend','Ingepland','Geblokkeerd'].map(s=>`<option ${s===r.status?'selected':''}>${s}</option>`).join('')}</select></td><td><span contenteditable="true" data-id="${r.id}" data-field="date" onblur="saveField(this)">${r.date}</span></td><td><span contenteditable="true" data-id="${r.id}" data-field="comment" onblur="saveField(this)">${r.comment}</span></td><td><button class="actie-toggle ${r.actie?'ja':''}" data-id="${r.id}" onclick="toggleActie(this)">${r.actie?'Ja':'Nee'}</button></td><td><button class="btn-del" data-proj="${projId}" data-id="${r.id}" onclick="deleteRow(this)">✕</button></td></tr>`).join('');
  document.getElementById('detailWrap').innerHTML=`<div class="detail-crumb">PROJECT · ITZU // ${proj.name.toUpperCase()}</div><div class="detail-title">${proj.name}</div><div class="hero-stats"><div class="hero-stat"><div class="hero-stat-val" style="color:${actie>0?'var(--red)':'var(--txt)'}">${actie}</div><div class="hero-stat-lbl">Actie Itzu</div></div><div class="hero-stat"><div class="hero-stat-val" style="color:${gebl>0?'var(--red)':'var(--txt)'}">${gebl}</div><div class="hero-stat-lbl">Geblokkeerd</div></div></div><div class="table-section"><div class="table-section-header"><span class="table-section-title">Trajecten · ${total}</span><button class="btn-add" onclick="openAddModal('${projId}')">+ Regel toevoegen</button></div><table><thead><tr><th>#</th><th>Beschrijving</th><th>Status</th><th>Oplevering</th><th>Commentaar</th><th>Actie Itzu?</th><th></th></tr></thead><tbody>${tableRows}</tbody></table></div>`;
}
function getLocalRow(id){for(const p of data){const r=p.rows.find(r=>r.id===id);if(r)return r;}return null}
function saveField(el){const r=getLocalRow(el.dataset.id);if(!r)return;r[el.dataset.field]=el.innerText.trim();updateTraject(el.dataset.id,{[el.dataset.field]:r[el.dataset.field]})}
function saveStatus(sel){const r=getLocalRow(sel.dataset.id);if(!r)return;r.status=sel.value;sel.style.cssText=statusSelectStyle(sel.value);const tr=document.getElementById(`tr-${sel.dataset.id}`);if(tr)tr.className=rowClass(sel.value);updateTraject(sel.dataset.id,{status:sel.value});refreshHeroStats(currentProjId)}
function toggleActie(btn){const r=getLocalRow(btn.dataset.id);if(!r)return;r.actie=!r.actie;btn.classList.toggle('ja',r.actie);btn.textContent=r.actie?'Ja':'Nee';updateTraject(btn.dataset.id,{actie:r.actie});refreshHeroStats(currentProjId)}
async function deleteRow(btn){const proj=data.find(p=>p.id===btn.dataset.proj);if(!proj)return;proj.rows=proj.rows.filter(r=>r.id!==btn.dataset.id);await deleteTraject(btn.dataset.id);renderDetail(btn.dataset.proj);showToast('Regel verwijderd')}
function refreshHeroStats(projId){const proj=data.find(p=>p.id===projId);if(!proj)return;const rows=proj.rows,actie=rows.filter(r=>r.actie).length,gebl=countByStatus(rows,'Geblokkeerd');const stats=document.querySelectorAll('.hero-stat');if(stats[0]){stats[0].querySelector('.hero-stat-val').style.color=actie>0?'var(--red)':'var(--txt)';stats[0].querySelector('.hero-stat-val').textContent=actie}if(stats[1]){stats[1].querySelector('.hero-stat-val').style.color=gebl>0?'var(--red)':'var(--txt)';stats[1].querySelector('.hero-stat-val').textContent=gebl}}
function openAddModal(projId){addModalProjId=projId;const proj=data.find(p=>p.id===projId);document.getElementById('mProj').value=proj?proj.name:'';document.getElementById('mDesc').value='';document.getElementById('mStatus').value='Aankomend';document.getElementById('mDate').value='';document.getElementById('mComment').value='';document.getElementById('mActie').value='false';document.getElementById('addModal').classList.add('open');setTimeout(()=>document.getElementById('mDesc').focus(),100)}
async function saveNewRow(){
  const proj=data.find(p=>p.id===addModalProjId);if(!proj)return;
  const fields={desc:document.getElementById('mDesc').value.trim(),status:document.getElementById('mStatus').value,date:document.getElementById('mDate').value.trim(),comment:document.getElementById('mComment').value.trim(),actie:document.getElementById('mActie').value==='true'};
  const row=await insertTraject(proj.dbId,fields,proj.rows.length+1);
  if(row)proj.rows.push({id:row.id,desc:row.beschrijving,status:row.status,date:row.oplevering,comment:row.commentaar,actie:row.actie_itzu});
  else proj.rows.push({id:'n'+(nextId++),desc:fields.desc,status:fields.status,date:fields.date,comment:fields.comment,actie:fields.actie});
  closeModal('addModal');renderDetail(addModalProjId);showToast('Regel toegevoegd ✓');
}
function openCsvImport(){document.getElementById('csvImportArea').value='';document.getElementById('csvImportModal').classList.add('open')}
async function doImport(){
  const raw=document.getElementById('csvImportArea').value.trim();
  const lines=raw.split('\n').filter(l=>l.trim()&&!l.startsWith('Project;'));
  for(const line of lines){
    const parts=line.split(';');if(parts.length<2)continue;
    const[projName,desc,status,date,comment,actieStr]=parts.map(p=>(p||'').trim());
    const proj=data.find(p=>p.name.toLowerCase()===projName.toLowerCase());if(!proj)continue;
    const row=await insertTraject(proj.dbId,{desc,status:status||'Aankomend',date,comment,actie:(actieStr||'').toLowerCase()==='ja'},proj.rows.length+1);
    if(row)proj.rows.push({id:row.id,desc:row.beschrijving,status:row.status,date:row.oplevering,comment:row.commentaar,actie:row.actie_itzu});
  }
  showToast('Import voltooid ✓');closeModal('csvImportModal');
  if(currentProjId)renderDetail(currentProjId);
  if(document.getElementById('vPo').classList.contains('active'))renderDashboard();
}
function closeModal(id){document.getElementById(id).classList.remove('open')}
document.querySelectorAll('.modal-overlay').forEach(ov=>ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('open')}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open'))});

const s=document.createElement('script');
s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
s.onload=init;
s.onerror=()=>{data=JSON.parse(JSON.stringify(FALLBACK));applyTheme(getTheme());setWeekInfo()};
document.head.appendChild(s);
</script>
